<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>네이버 연관검색어 마인드맵</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <div class="brand">Naver <span>MindMap</span></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="검색어를 입력하세요 (예: 에이스침대)" autocomplete="off">
    <button id="searchBtn">검색</button>
  </div>
</header>

<main>

  <!-- ── 월간 검색량 섹션 ── -->
  <section class="stats-section">
    <div class="section-header">
      <span class="section-title">월간 검색량</span>
      <span class="section-kw" id="stats-kw"></span>
    </div>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:#1a56db"></div>PC 검색수</div>
      <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div>Mobile 검색수</div>
      <span class="section-sub">각 행에 클릭수·CTR 표시 / 검색량 많은 순 정렬</span>
    </div>
    <div class="bar-chart-wrap" id="bar-chart">
      <p style="color:#9ca3af;font-size:13px;padding:20px 0">검색어를 입력하면 연관 키워드 통계가 표시됩니다.</p>
    </div>
  </section>

  <!-- ── 성별/연령 섹션 ── -->
  <div class="ga-section">
    <div class="ga-card" id="gender-section">
      <div class="ga-title">성별 검색 비율</div>
      <div class="ga-placeholder">네이버 DataLab API 연동 시 표시<br><span style="font-size:11px;margin-top:4px;display:block">별도 API 신청 필요</span></div>
    </div>
    <div class="ga-card" id="age-section">
      <div class="ga-title">연령별 검색 비율</div>
      <div class="ga-placeholder">네이버 DataLab API 연동 시 표시<br><span style="font-size:11px;margin-top:4px;display:block">별도 API 신청 필요</span></div>
    </div>
  </div>

  <!-- ── 마인드맵 섹션 ── -->
  <section class="mindmap-section">
    <div class="mindmap-header">
      <span class="mindmap-title">연관 키워드 마인드맵</span>
      <div class="mm-legend" id="mm-legend">
        <div class="mm-legend-item"><div class="mm-dot" style="background:#1a56db"></div>검색어</div>
        <div class="mm-legend-item"><div class="mm-dot" style="background:#22c55e"></div>1차 연관</div>
        <div class="mm-legend-item"><div class="mm-dot" style="background:#f59e0b"></div>2차 연관</div>
        <div class="mm-legend-item"><div class="mm-dot" style="background:#8b5cf6"></div>3차 연관</div>
      </div>
    </div>

    <svg id="graph"></svg>

    <div id="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">키워드를 검색하세요</div>
      <div class="empty-sub">네이버 연관 검색어를 마인드맵으로 시각화합니다</div>
    </div>
  </section>

</main>

<!-- ── 공통 UI ── -->
<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">연관 검색어 수집 중...</p>
  <p id="loading-progress"></p>
</div>
<div id="toast"></div>
<div id="tooltip"></div>
<div id="info-panel"></div>

<script src="app.js"></script>
</body>
</html>
