<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>네이버 연관검색어 마인드맵</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif;
      --bg-start: #ffffff;
      --bg-mid: #f0f4f8;
      --bg-end: #e8edf2;
      --glass-bg: rgba(255, 255, 255, 0.72);
      --glass-border: rgba(255, 255, 255, 0.35);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      --accent: #1a56db;
      --text-primary: #1d1d1f;
      --text-muted: rgba(29, 29, 31, 0.5);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 55%, var(--bg-end) 100%);
      color: var(--text-primary);
    }

    /* ── 헤더 ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 14px 24px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .brand {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      white-space: nowrap;
    }
    .brand span { color: var(--accent); }

    .search-wrap {
      display: flex;
      gap: 8px;
      flex: 1;
      max-width: 480px;
    }

    #searchInput {
      flex: 1;
      padding: 9px 16px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      font-size: 14px;
      font-family: var(--font);
      background: rgba(255,255,255,0.8);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #searchInput::placeholder { color: var(--text-muted); }
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.12);
    }

    #searchBtn {
      padding: 9px 20px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    #searchBtn:hover { background: #1648c0; }
    #searchBtn:active { transform: scale(0.97); }
    #searchBtn:disabled { background: #a0aec0; cursor: not-allowed; }

    .legend {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-left: auto;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.6);
    }

    #graph {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* ── 로딩 ── */
    #loading {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px 36px;
      box-shadow: var(--glass-shadow);
      text-align: center;
    }
    #loading.active { display: block; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(26,86,219,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    #loading p {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── 빈 상태 ── */
    #empty-state {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }
    #empty-state.hidden { display: none; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty-title {
      font-size: 20px; font-weight: 600;
      color: var(--text-primary); opacity: 0.4;
      margin-bottom: 8px; letter-spacing: -0.3px;
    }
    .empty-sub { font-size: 14px; color: var(--text-muted); }

    /* ── 토스트 ── */
    #toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(30,30,30,0.88);
      color: #fff;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 13px; font-weight: 500;
      backdrop-filter: blur(12px);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none; z-index: 200;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── 노드 애니메이션 (opacity만 — transform 충돌 방지) ── */
    @keyframes spin { to { transform: rotate(360deg); } }

    #tooltip {
      position: fixed; pointer-events: none;
      background: var(--glass-bg);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 10px; padding: 7px 12px;
      font-size: 12px; font-weight: 500;
      color: var(--text-primary);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      opacity: 0; transition: opacity 0.15s; z-index: 300;
    }
    #tooltip.visible { opacity: 1; }

    #info-panel {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 16px 20px;
      box-shadow: var(--glass-shadow);
      font-size: 13px; color: var(--text-muted);
      display: none; max-width: 240px;
    }
    #info-panel.visible { display: block; }
    #info-panel strong {
      display: block; font-size: 15px; font-weight: 600;
      color: var(--text-primary); margin-bottom: 4px; letter-spacing: -0.2px;
    }
    #info-panel .hint {
      margin-top: 8px; font-size: 11px;
      color: var(--accent); cursor: pointer;
    }
    #info-panel .hint:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="brand">Naver <span>MindMap</span></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="검색어를 입력하세요 (예: T멤버십)" autocomplete="off">
    <button id="searchBtn">검색</button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1a56db"></div>중심</div>
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>1차</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>2차</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>3차</div>
  </div>
</header>

<svg id="graph"></svg>

<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">연관 검색어 수집 중...</p>
</div>

<div id="empty-state">
  <div class="empty-icon">🔍</div>
  <div class="empty-title">키워드를 검색하세요</div>
  <div class="empty-sub">네이버 연관 검색어를 마인드맵으로 시각화합니다</div>
</div>

<div id="toast"></div>
<div id="tooltip"></div>
<div id="info-panel"></div>

<script>
// ────────────────────────────────────────
// 설정
// ────────────────────────────────────────
const DEPTH_COLORS  = ['#1a56db', '#22c55e', '#f59e0b', '#f97316'];
const DEPTH_RADIUS  = [38, 28, 22, 18];
const DEPTH_OPACITY = [1, 0.92, 0.85, 0.78];
const MAX_DEPTH     = 2;
const BRANCH_LIMITS = [Infinity, 10, 5, 3];
const REQUEST_DELAY = 400;

// ────────────────────────────────────────
// 네이버 연관검색어 — CORS 프록시 + HTML 파싱
// (자동완성 접두사 방식이 아닌 실제 연관검색어)
// ────────────────────────────────────────

// 네이버 SERP HTML에서 연관검색어 파싱 (다중 전략)
function parseRelatedFromHtml(html) {
  if (!html || html.length < 500) return [];

  // Method 1: CSS 셀렉터 (DOM 파싱)
  try {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const SELECTORS = [
      'a[href*="related_query"]',
      '.lst_related_srch .tit',
      '.related_srch a',
      '#nx_related_kwd a',
      'ul[class*="related"] li a',
      '[class*="relatedKeyword"] a',
      '[class*="relate_kwd"] a',
      '.keyword_box a',
    ];
    for (const sel of SELECTORS) {
      const kws = [...doc.querySelectorAll(sel)]
        .map(e => e.textContent.trim())
        .filter(k => k.length >= 2 && k.length <= 40);
      if (kws.length >= 2) return [...new Set(kws)].slice(0, 10);
    }
    // script 태그 JSON 패턴
    for (const s of doc.querySelectorAll('script')) {
      for (const pat of [
        /"relatedKeywords?":\s*\[([^\]]+)\]/,
        /"related_kwd[s]?":\s*\[([^\]]+)\]/,
        /"relateKwds?":\s*\[([^\]]+)\]/,
      ]) {
        const m = s.textContent.match(pat);
        if (m) {
          const kws = [...m[1].matchAll(/"([^"]{2,40})"/g)].map(x => x[1]);
          if (kws.length >= 2) return kws.slice(0, 10);
        }
      }
    }
  } catch(e) {}

  // Method 2: Raw HTML 정규식 (셀렉터 실패 시 — JS 렌더링 페이지 대응)
  try {
    // href에 related_query 포함된 링크 텍스트 추출
    const hrefs = [...html.matchAll(/related_query[^"]*"[^>]*>\s*([^<]{2,40})\s*<\/a>/g)]
      .map(m => m[1].trim());
    if (hrefs.length >= 2) return [...new Set(hrefs)].slice(0, 10);

    // "연관검색어" 텍스트 주변 앵커 태그 추출
    const idx = html.indexOf('연관검색어');
    if (idx > 0) {
      const section = html.slice(idx, idx + 4000);
      const kws = [...section.matchAll(/<a[^>]*>\s*([^<]{2,30})\s*<\/a>/g)]
        .map(m => m[1].trim())
        .filter(k => k.length >= 2 && !k.startsWith('<'));
      if (kws.length >= 2) return [...new Set(kws)].slice(0, 10);
    }
  } catch(e) {}

  return [];
}

// 1순위: AllOrigins — 모바일 Naver 우선 (서버사이드 렌더링 비율 높음)
async function fetchViaAllOrigins(keyword) {
  const searchUrls = [
    'https://m.search.naver.com/search.naver?where=m&query=' + encodeURIComponent(keyword),
    'https://search.naver.com/search.naver?query=' + encodeURIComponent(keyword),
  ];
  for (const searchUrl of searchUrls) {
    try {
      const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(searchUrl),
        { signal: AbortSignal.timeout(9000) });
      if (r.ok) {
        const kws = parseRelatedFromHtml(await r.text());
        if (kws.length >= 2) return kws;
      }
    } catch(e) {}
    try {
      const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(searchUrl),
        { signal: AbortSignal.timeout(9000) });
      if (r.ok) {
        const j = await r.json();
        const kws = parseRelatedFromHtml(j.contents || '');
        if (kws.length >= 2) return kws;
      }
    } catch(e) {}
  }
  return [];
}

// 2순위: corsproxy.io + cors.sh — 모바일 URL 사용
async function fetchViaCorsproxy(keyword) {
  const mobileUrl = 'https://m.search.naver.com/search.naver?where=m&query=' + encodeURIComponent(keyword);
  for (const proxyUrl of [
    'https://corsproxy.io/?' + encodeURIComponent(mobileUrl),
    'https://proxy.cors.sh/' + mobileUrl,
  ]) {
    try {
      const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(9000) });
      if (r.ok) {
        const kws = parseRelatedFromHtml(await r.text());
        if (kws.length >= 2) return kws;
      }
    } catch(e) {}
  }
  return [];
}

// 최종 fallback: 자동완성 JSONP
function fetchNaverAutocomplete(keyword) {
  return new Promise((resolve) => {
    const cbName = '__naver_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); resolve([]); }, 6000);
    function cleanup() {
      clearTimeout(timer);
      try { document.head.removeChild(script); } catch(e) {}
      delete window[cbName];
    }
    window[cbName] = function(data) {
      cleanup();
      try {
        const raw = data?.items?.[0] || [];
        const kws = raw.map(item => Array.isArray(item) ? item[0] : item)
                       .filter(k => k && typeof k === 'string' && k.trim().length > 0);
        resolve(kws.slice(0, 10));
      } catch(e) { resolve([]); }
    };
    script.onerror = () => { cleanup(); resolve([]); };
    script.src = 'https://ac.search.naver.com/nx/ac'
      + '?q=' + encodeURIComponent(keyword)
      + '&st=1100&r_format=json&r_enc=UTF-8&r_unicode=0'
      + '&t_koreng=1&ans=2&run=2&rev=4'
      + '&_callback=' + cbName;
    document.head.appendChild(script);
  });
}

// 통합: 연관검색어 우선, 실패 시 자동완성
async function fetchNaverKeywords(keyword) {
  try {
    const kws = await fetchViaAllOrigins(keyword);
    if (kws.length >= 2) return kws;
  } catch(e) {}

  try {
    const kws = await fetchViaCorsproxy(keyword);
    if (kws.length >= 2) return kws;
  } catch(e) {}

  // 프록시 모두 실패 시 자동완성으로 대체
  return fetchNaverAutocomplete(keyword);
}

// ────────────────────────────────────────
// D3 초기화
// ────────────────────────────────────────
const svg = d3.select('#graph');
let width  = window.innerWidth;
let height = window.innerHeight;

const defs = svg.append('defs');

// Glow 필터
const glow = defs.append('filter')
  .attr('id', 'glow').attr('x', '-50%').attr('y', '-50%')
  .attr('width', '200%').attr('height', '200%');
glow.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'coloredBlur');
const fm = glow.append('feMerge');
fm.append('feMergeNode').attr('in', 'coloredBlur');
fm.append('feMergeNode').attr('in', 'SourceGraphic');

// 깊이별 방사형 그라디언트
function lighten(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,Math.round(r+(255-r)*a))},${Math.min(255,Math.round(g+(255-g)*a))},${Math.min(255,Math.round(b+(255-b)*a))})`;
}
DEPTH_COLORS.forEach((color, i) => {
  const gr = defs.append('radialGradient').attr('id', `grad-${i}`)
    .attr('cx','35%').attr('cy','35%').attr('r','65%');
  gr.append('stop').attr('offset','0%')
    .attr('stop-color', lighten(color, 0.3)).attr('stop-opacity', DEPTH_OPACITY[i]);
  gr.append('stop').attr('offset','100%')
    .attr('stop-color', color).attr('stop-opacity', DEPTH_OPACITY[i]);
});

// 줌/패닝
const zoomG = svg.append('g').attr('id', 'zoom-layer');
const zoom = d3.zoom().scaleExtent([0.2, 4])
  .on('zoom', e => zoomG.attr('transform', e.transform));
svg.call(zoom).on('dblclick.zoom', null);

const linksG = zoomG.append('g').attr('id', 'links');
const nodesG = zoomG.append('g').attr('id', 'nodes');

// 시뮬레이션
const simulation = d3.forceSimulation()
  .force('link', d3.forceLink().id(d => d.id)
    .distance(d => 90 + (d.target.depth || 0) * 50).strength(0.6))
  .force('charge', d3.forceManyBody().strength(-320).distanceMax(500))
  .force('center', d3.forceCenter(width/2, height/2))
  .force('collision', d3.forceCollide().radius(d => DEPTH_RADIUS[Math.min(d.depth,3)] + 18))
  .alphaDecay(0.03);

// 상태
let nodes = [], links = [];
const nodeIds = new Set();
let isLoading = false;

// ────────────────────────────────────────
// UI 유틸
// ────────────────────────────────────────
const loadingEl   = document.getElementById('loading');
const loadingText = document.getElementById('loading-text');
const emptyState  = document.getElementById('empty-state');
const toastEl     = document.getElementById('toast');
const tooltipEl   = document.getElementById('tooltip');
const infoPanelEl = document.getElementById('info-panel');

let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3500);
}

function setLoading(active, text='연관 검색어 수집 중...') {
  isLoading = active;
  loadingText.textContent = text;
  loadingEl.classList.toggle('active', active);
  document.getElementById('searchBtn').disabled = active;
}

// ────────────────────────────────────────
// 그래프 렌더링
// ────────────────────────────────────────
function updateGraph() {
  // 연결선
  const link = linksG.selectAll('line')
    .data(links, d => `${d.source?.id||d.source}→${d.target?.id||d.target}`);
  link.enter().append('line')
    .attr('stroke','rgba(120,140,160,0.2)')
    .attr('stroke-width', 1.5)
    .attr('stroke-linecap','round');
  link.exit().remove();

  // 노드 그룹
  const node = nodesG.selectAll('g.node-group').data(nodes, d => d.id);
  const enter = node.enter().append('g')
    .attr('class','node-group')
    .style('opacity', 0)          // 초기 투명 — CSS transform 충돌 없음
    .style('cursor','pointer')
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on('mouseenter', onHover)
    .on('mouseleave', onLeave)
    .on('click', onClick);

  // 글로우 원
  enter.append('circle').attr('class','node-glow')
    .attr('r', d => DEPTH_RADIUS[Math.min(d.depth,3)] + 8)
    .attr('fill', d => DEPTH_COLORS[Math.min(d.depth,3)])
    .attr('fill-opacity', 0.08).attr('stroke','none');

  // 메인 원
  enter.append('circle').attr('class','node-circle')
    .attr('r', d => DEPTH_RADIUS[Math.min(d.depth,3)])
    .attr('fill', d => `url(#grad-${Math.min(d.depth,3)})`)
    .attr('stroke','rgba(255,255,255,0.65)')
    .attr('stroke-width', d => d.depth===0 ? 3 : 2);

  // 라벨
  enter.append('text').attr('class','node-label')
    .attr('text-anchor','middle').attr('dominant-baseline','central')
    .attr('fill','rgba(255,255,255,0.95)')
    .attr('font-size', d => d.depth===0 ? '13px' : d.depth===1 ? '11px' : '10px')
    .attr('font-weight', d => d.depth===0 ? '700' : '500')
    .attr('font-family','-apple-system, BlinkMacSystemFont, system-ui, sans-serif')
    .attr('pointer-events','none')
    .text(d => trunc(d.label, d.depth===0 ? 10 : 7));

  // 새 노드 fade-in (opacity만 — transform은 D3 tick이 관리)
  enter.transition().duration(450).ease(d3.easeCubicOut).style('opacity', 1);

  node.exit().remove();

  simulation.nodes(nodes);
  simulation.force('link').links(links);
  simulation.force('center', d3.forceCenter(width/2, height/2));
  simulation.alpha(0.5).restart();

  simulation.on('tick', () => {
    linksG.selectAll('line')
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodesG.selectAll('g.node-group')
      .attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

function trunc(s, n) { return s.length <= n ? s : s.slice(0,n) + '…'; }

// ────────────────────────────────────────
// 호버 / 클릭
// ────────────────────────────────────────
function onHover(e, d) {
  d3.select(this).select('.node-circle')
    .attr('filter','url(#glow)').transition().duration(150)
    .attr('r', DEPTH_RADIUS[Math.min(d.depth,3)] * 1.15);
  d3.select(this).select('.node-glow')
    .transition().duration(150).attr('fill-opacity', 0.2);
  tooltipEl.textContent = d.label;
  tooltipEl.style.left = (e.clientX+14)+'px';
  tooltipEl.style.top  = (e.clientY-8)+'px';
  tooltipEl.classList.add('visible');
}
function onLeave(e, d) {
  d3.select(this).select('.node-circle')
    .attr('filter',null).transition().duration(150)
    .attr('r', DEPTH_RADIUS[Math.min(d.depth,3)]);
  d3.select(this).select('.node-glow')
    .transition().duration(150).attr('fill-opacity', 0.08);
  tooltipEl.classList.remove('visible');
}
function onClick(e, d) {
  e.stopPropagation();
  if (isLoading) return;
  infoPanelEl.innerHTML = `<strong>${d.label}</strong>${d.depth}차 연관어<div class="hint" onclick="reSearch('${d.label.replace(/'/g,"\\'")}')">이 키워드로 새 검색 →</div>`;
  infoPanelEl.classList.add('visible');
}
svg.on('click', () => infoPanelEl.classList.remove('visible'));
window.reSearch = (kw) => { document.getElementById('searchInput').value = kw; startSearch(kw); };

// ────────────────────────────────────────
// 재귀 탐색 (fire-and-forget)
// ────────────────────────────────────────
async function expandNode(keyword, parentId, depth) {
  if (depth > MAX_DEPTH) return;
  if (nodes.length > 250) return;

  let related;
  try { related = await fetchNaverKeywords(keyword); }
  catch(e) { return; }

  if (!related || related.length === 0) return;

  const toExpand = [];
  const maxKids = BRANCH_LIMITS[depth] ?? 3;

  related.slice(0, maxKids).forEach(kw => {
    const id = kw.toLowerCase().trim();
    if (nodeIds.has(id)) {
      // 이미 있는 노드면 링크만 추가
      const linkExists = links.find(l =>
        (l.source?.id||l.source)===parentId && (l.target?.id||l.target)===id
      );
      if (!linkExists) links.push({ source: parentId, target: id });
      return;
    }
    nodeIds.add(id);
    const existing = nodes.find(n => n.id === id);
    if (!existing) nodes.push({ id, label: kw, depth });
    else existing.depth = Math.min(existing.depth, depth);
    links.push({ source: parentId, target: id });
    toExpand.push({ id, label: kw });
  });

  updateGraph();

  // 자식은 순차적으로 지연 실행 (rate-limit 보호)
  toExpand.forEach((child, i) => {
    setTimeout(() => expandNode(child.label, child.id, depth + 1), i * REQUEST_DELAY);
  });
}

// ────────────────────────────────────────
// 검색 시작
// ────────────────────────────────────────
async function startSearch(keyword) {
  if (!keyword || isLoading) return;
  keyword = keyword.trim();

  nodes = []; links = []; nodeIds.clear();
  linksG.selectAll('*').remove();
  nodesG.selectAll('*').remove();
  infoPanelEl.classList.remove('visible');
  emptyState.classList.add('hidden');

  const rootId = keyword.toLowerCase();
  nodeIds.add(rootId);
  nodes.push({ id: rootId, label: keyword, depth: 0, fx: width/2, fy: height/2 });
  updateGraph();

  setLoading(true, `"${keyword}" 연관검색어 수집 중...`);

  try {
    await expandNode(keyword, rootId, 1);
  } catch(e) {
    showToast('오류가 발생했습니다. 다시 시도해주세요.');
  } finally {
    setLoading(false);
    if (nodes.length <= 1) {
      showToast('연관 검색어를 찾지 못했습니다. 다른 키워드를 시도해보세요.');
    }
  }
}

// ────────────────────────────────────────
// 이벤트
// ────────────────────────────────────────
document.getElementById('searchBtn').addEventListener('click', () => {
  const kw = document.getElementById('searchInput').value.trim();
  if (kw) startSearch(kw);
});
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const kw = e.target.value.trim();
    if (kw) startSearch(kw);
  }
});
window.addEventListener('resize', () => {
  width = window.innerWidth; height = window.innerHeight;
  simulation.force('center', d3.forceCenter(width/2, height/2)).alpha(0.1).restart();
});
svg.call(zoom.transform, d3.zoomIdentity);
</script>
</body>
